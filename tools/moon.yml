$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'application'
language: 'typescript'

tasks:
  check:
    command: 'bunx biome check verify-repo-shape.ts verify-repo-shape.test.ts validate-kinds.ts validate-kinds.test.ts'
    inputs:
      - '*.ts'

  test:
    command: 'bun test'
    inputs:
      - '*.ts'

  validate-kinds:
    command: 'bun run validate-kinds.ts'
    inputs:
      - '../kinds/**/*.yaml'
      - '../kinds/_schema.json'
      - 'validate-kinds.ts'

  ci:
    command: 'noop'
    deps:
      - '~:check'
      - '~:test'
      - '~:validate-kinds'
