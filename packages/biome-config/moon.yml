$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

tasks:
  check:
    command: 'bunx biome check presets'
    inputs:
      - 'presets/**/*.json'

  test:
    command: 'bun run tests/run-fixtures.ts'
    inputs:
      - 'presets/**/*.json'
      - 'tests/**'

  ci:
    command: 'noop'
    deps:
      - '~:check'
      - '~:test'
