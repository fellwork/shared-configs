$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

tasks:
  check:
    command: 'bunx biome check .'
    inputs:
      - '*.js'
      - '*.json'

  test:
    command: 'bun -e "import(\"./index.js\").then(m => { if (!m.default.rules) process.exit(1); })"'
    inputs:
      - 'index.js'

  ci:
    command: 'noop'
    deps:
      - '~:check'
      - '~:test'
