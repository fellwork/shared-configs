$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

tasks:
  check:
    command: 'bunx biome check presets'
    inputs:
      - 'presets/**/*.json'

  test:
    command: 'bunx oxlint --config presets/base.json -- presets'
    inputs:
      - 'presets/**/*.json'

  ci:
    command: 'noop'
    deps:
      - '~:check'
      - '~:test'
