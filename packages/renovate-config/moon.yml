$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

tasks:
  check:
    command: 'bunx biome check .'
    inputs:
      - '*.json'

  test:
    command: 'bunx biome check default.json'
    inputs:
      - 'default.json'

  ci:
    command: 'noop'
    deps:
      - '~:check'
      - '~:test'
