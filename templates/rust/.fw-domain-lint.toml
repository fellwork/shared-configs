# fw-domain-lint configuration.
#
# Enforces the database-domain writer contract defined in
# wiki/systems/database-domains.md (authoritative, I-6) plus the
# apps/web audit in wiki/analyses/2026-04-20-apps-web-server-route-audit.md.
#
# All five rules from Plan v2 §C.2 are now wired end-to-end:
#
#   Rule 1  [rust]              apps/api must not write CORPUS tables
#   Rule 2  [rust]              apps/api reading_plans writers are path-allowlisted
#                               (influencer.rs for the 'influencer' partition;
#                                admin/reading_plans.rs for cross-partition admin)
#   Rule 3  [rust_visibility]   fw-store::delete_predicate must stay module-private
#   Rule 4  [rust]              phrased_blocks writers restricted to fw-phrase,
#                               fw-pipeline, and fw-store (restore)
#   Rule 5  [ts]                apps/web/layers/*/server/api must not write
#                               CORPUS tables via Supabase-JS chains
#
# Each rule's allowlist entry below is commented to explain WHY the path is
# exempt. Add to an allowlist only after a recorded architectural decision.

# ── Schema version pin ────────────────────────────────────────────────────
# Bumping this requires coordinated PRs across fellwork-api (bump the
# EXPECTED_SCHEMA_VERSION constant in fw-domain-lint) and any consumer
# repo whose CI clones this file (currently fellwork-api and fellwork-web).
# See fellwork-ops/CLAUDE.md § Domain-lint config and the fw-domain-lint
# source at crates/fw-domain-lint/src/lib.rs.
schema_version = "1"

# ── Rule 1 ─────────────────────────────────────────────────────────────────
# apps/api/src/ must not INSERT / UPDATE / DELETE pure CORPUS-data tables.
# The two documented exceptions (curation.rs and influencer.rs) are handled
# by narrower rules below.
[[rule]]
name = "apps/api must not write CORPUS tables"
paths = ["fellwork-api/apps/api/src/"]
# Two existing files build dynamic SQL via `format!` / variable binding
# but have been audited (I-2) and confirmed to only touch USER-domain
# tables (`profiles`) or read-only SELECTs over pipeline/corpus tables.
# The linter cannot statically verify this, so it would otherwise flag
# them fail-closed. Remove an entry here only after re-auditing the file.
