paths = ["fellwork-api/crates/", "fellwork-api/apps/", "apps/"]
allow_paths = [
  # The existing fw-translate crate will be repurposed in Phase 3. Until
  # then, block every write.
  # "fellwork-api/crates/fw-translate/",
]
forbid_targets = ["canonical_renderings"]
allow_interpolation = true

# ── Rule 6.5 ───────────────────────────────────────────────────────────────
# verse_coherency_reports writable only by fw-coherency. verify_verse is
# the sole producer.
[[rule]]
name = "verse_coherency_reports only from fw-coherency"
paths = ["fellwork-api/crates/", "fellwork-api/apps/", "apps/"]
allow_paths = [
  # "fellwork-api/crates/fw-coherency/",
]
forbid_targets = ["verse_coherency_reports"]
allow_interpolation = true

# ── Rule 6.6 ───────────────────────────────────────────────────────────────
# rendering_rules is seed/admin-tool-only. NO runtime crate may write it.
# The rule catalog is data, not code; runtime reads it read-only. The admin
# path has not been named yet (tracked in wiki/plans/2026-04-23-chunk-
# translation-engine-design.md open questions — Phase 3 will decide whether
# this is fw-rules-admin, a fw-store subcommand, or an apps/api admin route).
# Until named, the empty allow_paths means every write is blocked.
[[rule]]
name = "rendering_rules only from admin/seed tooling"
paths = ["fellwork-api/crates/", "fellwork-api/apps/", "apps/"]
allow_paths = [
  # Empty at plan time. Add admin CLI path when tooling lands in Phase 3.
]
forbid_targets = ["rendering_rules"]
allow_interpolation = true

# ── Rule 7 (grep) ──────────────────────────────────────────────────────────
# Engine crates must not reference non-Fellwork English translation
# infrastructure. Captures imports, SQL strings, identifier mentions — any
# textual reference to BSB/LSB/ESV/NIV/NLT/KJV/NET tables, loaders, or
# symbols. See wiki/plans/2026-04-23-chunk-translation-engine-design.md
# Principle 6 ("No other translations as input"). Uses RuleKind::SourceGrep
# added in Phase 0.A (commit 29de9f7).
#
# NOTE: fellwork-api/crates/fw-translate/ is intentionally NOT in `paths`
# yet — the existing crate reads english_tokens for BSB diffs. Phase 3
# repurposes fw-translate as the chunk-first orchestrator and deletes
# those reads; at that time, add "fellwork-api/crates/fw-translate/" back
# into both Rule 7 blocks' paths lists.
[[rule]]
name = "engine crates must not reference non-Fellwork translations"
kind = "source_grep"
paths = [
  # Crates listed whether or not they currently exist; Phase 3 scaffolds
  # them and Rule 7 starts firing immediately upon their creation.
  "fellwork-api/crates/fw-chunker/",
  "fellwork-api/crates/fw-lexicon-resolver/",
  "fellwork-api/crates/fw-rules/",
  "fellwork-api/crates/fw-idiom/",
  "fellwork-api/crates/fw-clause-render/",
  "fellwork-api/crates/fw-coherency/",
  # fw-translate/ excluded until Phase 3 purge — see NOTE above.
]
patterns = [
  # BSB and sibling translation tables in the corpus
  "english_tokens",
  "kjv_tokens",
  "stepbible_tokens",
  "passage_translations",
  "contextual_translations",
  "translation_parallels",
  "translation_verses",
  "translation_renderings",
  "translation_comparisons",
  "translation_profiles",
  "esv_strongs_alignment",
  "lxx_word_alignments",
  # Module-name hints — an engine crate importing a bsb loader is wrong
  "fw_bsb",
  "fw_english_tokens",
  # Translation-acronym literals. False-positive risk is low; an engine
  # crate with the string "ESV" in its source is almost certainly wrong.
  "BSB",
  "LSB",
  "ESV",
  "NIV",
  "NLT",
  "KJV",
  "NET",
]
file_extensions = ["rs"]

# ── Rule 7 (rust check_reads) ──────────────────────────────────────────────
# Companion to Rule 7 grep. The grep catches literal references; this
# catches SQL SELECT targets. Uses the check_reads flag added in Phase 0.A
# (commit 3353ecc) and honoring require_where_contains per commit f736099.
# Same fw-translate/ exclusion as Rule 7 grep — see NOTE above.
[[rule]]
name = "engine crates must not SELECT translation tables"
paths = [
  "fellwork-api/crates/fw-chunker/",
  "fellwork-api/crates/fw-lexicon-resolver/",
  "fellwork-api/crates/fw-rules/",
  "fellwork-api/crates/fw-idiom/",
  "fellwork-api/crates/fw-clause-render/",
  "fellwork-api/crates/fw-coherency/",
  # fw-translate/ excluded until Phase 3 purge — see NOTE above Rule 7 grep.
]
forbid_targets = [
  "english_tokens",
  "kjv_tokens",
  "stepbible_tokens",
  "passage_translations",
  "contextual_translations",
  "translation_parallels",
  "translation_verses",
  "translation_renderings",
  "translation_comparisons",
  "translation_profiles",
  "esv_strongs_alignment",
  "lxx_word_alignments",
]
check_reads = true
allow_interpolation = true

# ── Rule 8.a ───────────────────────────────────────────────────────────────
# Rust word-detail resolvers must not reference fellwork_glosses (retired
# post-phase-4). The word-detail GraphQL resolver lives in fw-graph-build;
# tap-a-word reads chunk_lexicon_context directly. Any fellwork_glosses
# reference in this path is either a regression or a ghost query against a
# table that will soon be gone.
[[rule]]
name = "WordDetail resolvers must not reference fellwork_glosses"
kind = "source_grep"
paths = [
  "fellwork-api/crates/fw-graph-build/src/resolve/reader.rs",
  "fellwork-api/crates/fw-graph-build/src/resolve/word_detail/",
]
patterns = [
  "fellwork_glosses",
  # Plausible reintroduction names to guard against
  "per_token_glosses",
  "token_glosses",
  "gloss_table",
]
file_extensions = ["rs"]

# ── Rule 8.b ───────────────────────────────────────────────────────────────
# TypeScript word-detail code (apps/web tap-a-word composables, Vue
# components, server routes) must not reference fellwork_glosses either.
[[rule]]
name = "apps/web word-detail must not reference fellwork_glosses"
kind = "source_grep"
paths = [
  "fellwork-web/apps/web/layers/reader/",
  "fellwork-web/apps/web/composables/useWordDetail",
  "fellwork-web/apps/web/components/Reader/WordDetail",
]
patterns = [
  "fellwork_glosses",
  "per_token_glosses",
  "token_glosses",
  "gloss_table",
]
file_extensions = ["ts", "mts", "vue"]

# ── Rule 8.c ───────────────────────────────────────────────────────────────
# Rust SQL-target guard: if a word-detail resolver tries to SELECT FROM
# fellwork_glosses specifically (vs. just mentioning the name in a string
# that 8.a already catches), this rule fires via check_reads on sqlx calls.
# Narrow path — only the resolver modules, not the whole crate, so we don't
# accidentally cover the Chapter reader resolver which has its own contract.
[[rule]]
name = "WordDetail resolvers must not SELECT fellwork_glosses"
paths = ["fellwork-api/crates/fw-graph-build/src/resolve/"]
forbid_targets = ["fellwork_glosses"]
check_reads = true
allow_interpolation = true
