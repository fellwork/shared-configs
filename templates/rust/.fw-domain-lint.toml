  # coverage.rs — SELECTs over pipeline_commentary_generations and
  # format!("SELECT count(*) FROM {table}") for dashboard stats. No writes.
  "fellwork-api/apps/api/src/routes/admin/coverage.rs",
  # users.rs — format!("UPDATE profiles SET {fields} WHERE id = $1"). The
  # dynamic field list is whitelisted in the surrounding push_set!. Target
