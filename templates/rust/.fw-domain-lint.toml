# ── Rule 2 ─────────────────────────────────────────────────────────────────
# apps/api writes to `reading_plans` / `reading_plan_days` must originate in
# a path-allowlisted partition writer. I-2 confirmed there are exactly two
# legitimate writer paths in apps/api:
#
#   1. protected/community/influencer.rs — the 'influencer' partition. Every
#      INSERT hardcodes `plan_type = 'influencer'`; every top-level
#      UPDATE/DELETE is keyed to `created_by = auth.uid()`. Some follow-up
#      total_days UPDATEs ("UPDATE reading_plans SET total_days ... WHERE
#      id = $1::uuid") omit plan_type but sit inside a require_influencer()
#      gate and are legitimate. Path-allowlisting this file avoids the
#      false positive the plain `require_where_contains` check would create.
#   2. admin/reading_plans.rs — cross-partition admin moderation, introduced
#      by Subagent ε as the consolidated admin writer. The file does not
#      exist yet at time of this commit; the allowlist entry lands ahead of
#      ε's merge so that the lint stays green once ε's path appears.
#
# Any OTHER apps/api file that writes these tables is a domain violation.
[[rule]]
name = "apps/api reading_plans writers must be partition-allowlisted"
paths = ["fellwork-api/apps/api/src/"]
allow_paths = [
  # Influencer partition writer (plan_type='influencer'). Per I-2 Case 2.
  "fellwork-api/apps/api/src/routes/protected/community/influencer.rs",
  # Cross-partition admin writer from Subagent ε. Lands post-merge.
  "fellwork-api/apps/api/src/routes/admin/reading_plans.rs",
  # Grandfathered dynamic-SQL files — see Rule 1 allowlist for rationale.
  # None of these write reading_plans; allowlisting prevents the unresolvable
  # fail-closed from double-flagging them here.
  "fellwork-api/apps/api/src/routes/admin/coverage.rs",
  "fellwork-api/apps/api/src/routes/admin/users.rs",
  "fellwork-api/apps/api/src/routes/admin/grammar.rs",
  "fellwork-api/apps/api/src/routes/admin/language.rs",
  "fellwork-api/apps/api/src/routes/admin/pma_queue.rs",
]
forbid_targets = [
  "reading_plans",
  "reading_plan_days",
]
# No `require_where_contains` — the path allowlist is the enforcement
# mechanism. If a new apps/api file writes reading_plans, the allowlist
# must be extended explicitly (with a comment saying why).

# ── Rule 3 ─────────────────────────────────────────────────────────────────
# `fw-store::delete_predicate` must remain module-private. Currently declared
# as a bare `fn delete_predicate(...)` at crates/fw-store/src/main.rs:668 —
# that is the correct state. Rule 3 keeps it that way. Any future refactor
# that exposes it as `pub fn`, `pub(crate) fn`, or `pub(in ...) fn` is
# flagged. The function issues destructive `DELETE FROM phrased_blocks /
# concepts / ...` SQL used only by disaster-recovery `fw-store restore`;
# external callers would erase corpus rows from code outside a hash-guarded
# entry point. See I-6 § Exception: fellwork_glosses + resolved_tokens.
[[rule]]
name = "fw-store::delete_predicate must stay module-private"
kind = "rust_visibility"
paths = ["fellwork-api/crates/fw-store/"]
symbols = ["delete_predicate"]
max_visibility = "private"

# ── Rule 4 ─────────────────────────────────────────────────────────────────
# `phrased_blocks` is written by exactly three crates:
#
#   1. fw-phrase — the authoritative deterministic engine (primary writer,
#      last-write-wins per I-6 § Exception: phrased_blocks).
#   2. fw-pipeline — AI-edge-case supplementary writes in the ingest flow.
#   3. fw-store — disaster-recovery `DELETE FROM phrased_blocks WHERE
#      passage_ref LIKE $1` followed by bulk re-INSERT from JSON archives.
#      Gated by `delete_predicate` (Rule 3) and a content-hash check.
#
# Any new writer anywhere else — apps/api, apps/web, new crates, dormant
# crates — is a domain violation. Rule 4 applies to the entire monorepo
# under crates/ and apps/ because the table is authoritatively corpus.
[[rule]]
name = "phrased_blocks only from fw-phrase, fw-pipeline, fw-store"
paths = ["fellwork-api/crates/", "fellwork-api/apps/", "apps/"]
allow_paths = [
  # Primary deterministic engine. Per CLAUDE.md "Phrasing Engine".
  "fellwork-api/crates/fw-phrase/",
  # AI-edge-case writes in the ingest flow. Per I-4 § fw-pipeline.
  "fellwork-api/crates/fw-pipeline/",
  # Disaster-recovery restore. Per I-6 § Exception: fellwork_glosses.
  "fellwork-api/crates/fw-store/",
]
forbid_targets = [
  "phrased_blocks",
]
# Rule 4 has a very broad `paths` scope (every crate and app). Fail-closed
# on runtime interpolation would flag every fw-graph-* introspection
# query, every dynamic SELECT builder, every sqlx helper that calls
# `sqlx::query(sql_string)` — none of which can target phrased_blocks
# without a literal mention of the table name. Permit unresolvable
# interpolation for this rule; the planted-violation test demonstrates
# that a literal `INSERT INTO phrased_blocks` from a non-allowlisted path
# is still flagged.
allow_interpolation = true

# ── Rule 5 ─────────────────────────────────────────────────────────────────
