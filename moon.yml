$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  ci:
    command: 'noop'
    deps:
      - '~:check'
      - '~:build'
      - 'packages.*:check'
      - 'packages.*:test'

  build:
    command: 'bunx rolldown -c'
    inputs:
      - 'src/**/*.ts'
      - 'tsconfig.json'
      - 'rolldown.config.ts'
    outputs:
      - 'dist/**/*'

  check:
    command: 'bunx biome check .'
    inputs:
      - '**/*.{json,jsonc,ts,tsx,md,yaml,yml}'
      - '!packages/**'
      - '!templates/**'

  release:
    command: 'bunx changeset publish'
    options:
      runInCI: false
